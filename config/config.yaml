# ═══════════════════════════════════════════════════════════════
#                     TrendRadar 配置文件
# ═══════════════════════════════════════════════════════════════

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  # 时区配置
  timezone: "Asia/Shanghai"
  show_version_update: true           # 显示版本更新提示

# ===============================================================
# 2. 数据源 - 热榜平台
# ===============================================================
platforms:
  enabled: true                         # 是否启用热榜平台抓取
  sources:
    # --- 这里保留了你自定义的财经类数据源 ---
    - id: "wallstreetcn-hot"
      name: "华尔街见闻 最热"
    - id: "wallstreetcn-quick"
      name: "华尔街见闻 快讯"
    - id: "wallstreetcn-news"
      name: "华尔街见闻 最新"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "gelonghui"
      name: "格隆汇"
    - id: "jin10"
      name: "金十数据"
    - id: "fastbull"
      name: "快讯通"
    - id: "tencent-hot"
      name: "腾讯新闻 综合早报"
    - id: "cls-telegraph"
      name: "财联社 电报"
    - id: "cls-depth"
      name: "财联社 深度"
    - id: "cls-hot"
      name: "财联社 热门"
    - id: "fastbull-express"
      name: "法布财经 快讯"
    - id: "fastbull-news"
      name: "法布财经 头条"

# ===============================================================
# 3. 数据源 - RSS 订阅
# ===============================================================
rss:
  enabled: true                       # 是否启用 RSS 抓取

  # 文章新鲜度过滤配置
  freshness_filter:
    enabled: true                     # 是否启用新鲜度过滤（默认启用）
    max_age_days: 3                   # 最大文章年龄（天）

  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"

    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"

    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"
      enabled: false                  # 禁用

# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  # --- 保留了你习惯的 incremental (增量) 模式 ---
  mode: "incremental"                 # 可选: daily | current | incremental
  display_mode: "keyword"             # 分组维度: keyword | platform
  
  rank_threshold: 5                   # 排名高亮阈值
  
  # --- 保留了你的排序偏好 ---
  sort_by_position_first: false       # true=按配置位置排序，false=按热点条数排序
  max_news_per_keyword: 0             # 每个关键词最大显示数量（0=不限制）
  reverse_content_order: false        # false=热点词汇统计在前，true=新增热点新闻在前

# ===============================================================
# 5. 推送内容控制 (作者新增功能)
# ===============================================================
display:
  # 📋 区域显示顺序
  region_order:
    - new_items                       # 1️⃣ 新增热点区域
    - hotlist                         # 2️⃣ 热榜区域（关键词匹配）
    - rss                             # 3️⃣ RSS 订阅区域
    - standalone                      # 4️⃣ 独立展示区
    - ai_analysis                     # 5️⃣ AI 分析区域

  # 推送区域开关
  regions:
    hotlist: true                     # 热榜区域
    new_items: true                   # 新增热点区域
    rss: true                         # RSS 订阅区域
    standalone: false                 # 独立展示区
    ai_analysis: true                 # AI 分析区域

  # 📋 独立展示区配置
  standalone:
    platforms: []                     
    rss_feeds: []                     
    max_items: 20                     

# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true                       # 是否启用通知功能

  # --- 保留了你的工作时间窗口设置 ---
  push_window:
    enabled: true                     # 启用时间窗口控制
    start: "08:00"                    # 开始时间（你的设置）
    end: "20:00"                      # 结束时间（你的设置）
    once_per_day: false                # true=窗口内只推送一次

  # 推送渠道配置 (Webhooks)
  # ⚠️ 建议使用 GitHub Secrets，不要直接填在这里
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  # --- 保留了你的 remote 设置 ---
  backend: "remote"

  # 数据格式选项
  formats:
    sqlite: true
    txt: false
    html: true                        # 是否生成 HTML 报告

  # 本地存储配置
  local:
    data_dir: "output"
    retention_days: 0

  # 远程存储配置
  remote:
    retention_days: 0
    endpoint_url: ""                  # 使用 GitHub Secrets 配置
    # --- 保留了你的 bucket 名称 ---
    bucket_name: "trendradar"         
    access_key_id: ""
    secret_access_key: ""
    region: ""

  # 数据拉取配置 (作者新增)
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型配置（共享）
# ===============================================================
ai:
  # --- 这里完全保留了你的 Qwen 配置 ---
  provider: "custom"                # 你的设置
  api_key: ""      # 你的 Key (请确认此处)

  model: "Pro/zai-org/GLM-4.7"         

  # ⚠️ 根据你程序的反馈，这里必须保持完整路径
  base_url: "https://api.siliconflow.cn/v1"
  
  timeout: 90                       # 请求超时（秒）

  # AI 参数配置 (作者新增，建议保留)
  temperature: 1.0                  # 采样温度
  max_tokens: 5000                  # 最大生成 token 数

# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true                     # 是否启用 AI 分析
  
  language: "Chinese"

  # 提示词配置文件路径
  prompt_file: "ai_analysis_prompt.txt"

  # 分析内容配置
  max_news_for_analysis: 50
  include_rss: false
  
  # 作者新增的时间线功能
  include_rank_timeline: true       # 是否传递完整排名时间线

# ===============================================================
# 10. AI 翻译功能 (作者新增模块)
# ===============================================================
ai_translation:
  enabled: true                    # 默认关闭，你可以手动改为 true
  language: "English"
  prompt_file: "ai_translation_prompt.txt"

# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  
  # 版本检查地址
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"

  # 热榜爬虫参数
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  # RSS 设置
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  # 排序权重
  # --- 保留了你的权重设置 ---
  weight:
    rank: 0.4                       # 你的设置 (0.4)
    frequency: 0.5                  # 你的设置 (0.5)
    hotness: 0.1

  max_accounts_per_channel: 3
  
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━━━━"
